version: v1
name: wf-customer-data-as
type: workflow
tags:
  - customer
workflow:
  dag:
    - name: customer-data-asen
      description: geo-table
      spec:
        tags:
          - customer
        stack: flare:7.0
        compute: runnable-default
        stackSpec:
          driver:
            cores: 2
            memory: 2000m
          executor:
            cores: 1
            instances: 4
            memory: 2000m
          job:
            explain: true
            logLevel: INFO
            inputs:
              - name: customer_df
                dataset: dataos://postgres:public/customers?acl=r
                format: jdbc
                options:
                  driver: org.postgresql.Driver    

            steps:
              - sequence:
                  - name: final_df
                    sql: >    
                        SELECT 
                            *
                        FROM customer_df



            outputs:

              - name: final_df
                dataset: dataos://postgres:public/customer_dataas?acl=rw
                driver: org.postgresql.Driver
                format: jdbc
                options:
                  saveMode: overwrite
                description: Data set from Icebase
                tags:
                  - Connect
                title: Postgres Dataset


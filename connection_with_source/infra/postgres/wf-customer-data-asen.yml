# Important: Replace 'abc' with your initials to personalize and distinguish the resource you’ve created.
version: v1
name: wf-customer-data-asen
type: workflow
workflow:
  dag:
    - name: dg-customer-data
      spec:
        stack: flare:7.0
        compute: runnable-default
        stackSpec:
          inputs:
            - name: customer_data
              dataset: dataos://depottestas:public/product_data?acl=r
              format: jdbc
              options:
                driver: org.postgresql.Driver
          steps:
            - sequence:
                - name: final
                  sql: >
                    SELECT 
                        *
                    FROM customer_data
          outputs:
            - name: final
              dataset: dataos://depottestas:public/customer_data_asen?acl=rw
              driver: org.postgresql.Driver
              format: jdbc
              title: Purchase Dataset
              options:
                saveMode: overwrite